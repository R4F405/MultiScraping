events {
    worker_connections 1024;
}

http {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://scraperleadweb:8081;
        }
    }

    # ── HTTPS (descomentar cuando haya dominio + certificados SSL) ─────────────
    # Paso 1: obtener certificado con Let's Encrypt:
    #   certbot certonly --standalone -d tudominio.com
    #   cp /etc/letsencrypt/live/tudominio.com/fullchain.pem nginx/certs/
    #   cp /etc/letsencrypt/live/tudominio.com/privkey.pem   nginx/certs/
    #
    # Paso 2: cambiar HTTPS_ONLY=true en .env
    #
    # Paso 3: descomentar estos bloques y comentar el server listen 80 de arriba:
    #
    # server {
    #     listen 80;
    #     server_name tudominio.com;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl;
    #     server_name tudominio.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     location / {
    #         proxy_pass http://scraperleadweb:8081;
    #     }
    # }
}
