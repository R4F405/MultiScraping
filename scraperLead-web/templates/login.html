<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Scraper Lead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="h-full bg-slate-950 font-[Inter,system-ui,sans-serif] flex items-center justify-center">

<div class="w-full max-w-sm px-4">

  <!-- Logo + título -->
  <div class="flex flex-col items-center mb-8">
    <div class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center mb-4">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
    </div>
    <h1 class="text-white font-semibold text-xl tracking-tight">Scraper Lead</h1>
    <p class="text-slate-500 text-sm mt-1">Acceso restringido</p>
  </div>

  <!-- Card -->
  <div class="bg-slate-900 border border-white/10 rounded-2xl p-6">

    <!-- Error -->
    {% if error %}
    <div class="mb-4 px-3.5 py-2.5 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center gap-2.5">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400 shrink-0">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span class="text-red-400 text-sm">{{ error }}</span>
    </div>
    {% endif %}

    <!-- Form -->
    <form method="post" action="/auth/login" class="space-y-4">
      <input type="hidden" name="next" value="{{ next | default('/') }}" />

      <div>
        <label for="username" class="block text-xs font-medium text-slate-400 mb-1.5">Usuario</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          autofocus
          class="w-full px-3.5 py-2.5 rounded-lg bg-slate-800 border border-white/10 text-white text-sm placeholder-slate-600
                 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition"
          placeholder="tu_usuario"
        />
      </div>

      <div>
        <label for="password" class="block text-xs font-medium text-slate-400 mb-1.5">Contraseña</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          class="w-full px-3.5 py-2.5 rounded-lg bg-slate-800 border border-white/10 text-white text-sm placeholder-slate-600
                 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        class="w-full py-2.5 px-4 rounded-lg bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-medium transition cursor-pointer mt-2"
      >
        Entrar
      </button>
    </form>

  </div>

</div>

</body>
</html>
